<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Éditeur JavaScript</title>
<link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet" />
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
}

h1 {
    text-align: center;
    padding: 20px;
    margin: 0;
}

.container {
    display: flex;
    gap: 20px;
    padding: 20px;
    height: calc(100vh - 100px);
}

.panel {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* === EDITEUR === */

.editor {
    position: relative;
    flex: 1;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #ccc;
    background: #2d2d2d;
}

/* textarea au-dessus */
textarea {
    position: absolute;
    inset: 0;
    resize: none;
    padding: 15px;
    font-family: monospace;
    font-size: 14px;
    background: transparent;
    color: transparent;
    caret-color: white;
    border: none;
    outline: none;
    z-index: 2;
    white-space: pre;
    overflow: auto;
}

/* Prism en dessous */
pre {
    margin: 0;
    height: 100%;
    padding: 15px;
    overflow: auto;
    font-size: 14px;
    pointer-events: none;
}

/* === BOUTON === */

button {
    margin-top: 10px;
    padding: 12px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background-color: #2563eb;
    color: white;
    cursor: pointer;
}

button:hover {
    background-color: #1e40af;
}

/* === CONSOLE === */

.console {
    flex: 1;
    background-color: black;
    color: #00ff00;
    padding: 15px;
    border-radius: 10px;
    font-family: monospace;
    overflow-y: auto;
    white-space: pre-wrap;
    text-shadow: 0 0 5px #00ff00;
}

.empty {
    opacity: 0.5;
}
</style>
</head>

<body>

<h1>Éditeur JavaScript</h1>

<div class="container">

<div class="panel">
    <div class="editor">
        <pre><code id="highlight" class="language-javascript"></code></pre>
        <textarea id="code"></textarea>
    </div>
    <button onclick="runCode()">Lancer le code (Ctrl + Entrée)</button>
</div>

<div class="panel">
    <div id="console" class="console">
        <div class="empty">Console vide...</div>
    </div>
</div>

</div>

<!-- PrismJS Scripts -->
<script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-javascript.min.js"></script>

<script>
const textarea = document.getElementById("code");
const highlight = document.getElementById("highlight");
const consoleDiv = document.getElementById("console");

/* === Colorisation === */
function updateHighlight() {
    highlight.textContent = textarea.value;
    Prism.highlightElement(highlight);
}

textarea.addEventListener("input", updateHighlight);

/* Synchronisation scroll */
textarea.addEventListener("scroll", () => {
    highlight.parentElement.scrollTop = textarea.scrollTop;
});

/* Lancer avec Ctrl+Entrée */
textarea.addEventListener("keydown", function(e) {
    if (e.ctrlKey && e.key === "Enter") {
        runCode();
    }
});

/* Code par défaut */
textarea.value = `console.log("Bonjour !");
console.log({nom: "Alex", age: 15});`;

updateHighlight();

/* === Exécution === */
function runCode() {

    consoleDiv.innerHTML = "";

    function aff(...args) {
        const line = args.map(arg => {
            if (typeof arg === "object") {
                return JSON.stringify(arg, null, 2);
            }
            return String(arg);
        }).join(" ");

        const div = document.createElement("div");
        div.textContent = line;
        consoleDiv.appendChild(div);
    }

    try {
        const userFunction = new Function("console", textarea.value);

        userFunction({
            log: aff
        });

        if (consoleDiv.innerHTML === "") {
            consoleDiv.innerHTML = '<div class="empty">Aucune sortie</div>';
        }

    } catch (error) {
        const errorDiv = document.createElement("div");
        errorDiv.textContent = "Erreur : " + error.message;
        errorDiv.style.color = "red";
        consoleDiv.appendChild(errorDiv);
    }
}
</script>

</body>
</html>
