<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" href="favicon.ico" type="image/x-icon">
<title>Éditeur JS avec Monaco</title>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.41.0/min/vs/loader.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

h1 {
    text-align: center;
    padding: 15px;
    margin: 0;
    background-color: #2563eb;
    color: white;
}

#editorContainer {
    flex: 1;
}

#console {
    height: 150px;
    background-color: black;
    color: #00ff00;
    font-family: monospace;
    padding: 10px;
    overflow-y: auto;
    white-space: pre-wrap;
    text-shadow: 0 0 5px #00ff00;
}
button {
    padding: 10px 20px;
    margin: 5px 20px;
    border: none;
    border-radius: 8px;
    background-color: #2563eb;
    color: white;
    cursor: pointer;
}
button:hover {
    background-color: #1e40af;
}
</style>
</head>
<body>

<h1>Éditeur JavaScript Pro</h1>

<div id="editorContainer"></div>
<button onclick="runCode()">Lancer le code (Ctrl+Entrée)</button>
<div id="console"><div class="empty">Console vide...</div></div>

<script>
require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.41.0/min/vs' }});
require(['vs/editor/editor.main'], function () {
    window.editor = monaco.editor.create(document.getElementById('editorContainer'), {
        value: `console.log("Bonjour !");
console.log({nom: "Alex", age: 15});`,
        language: 'javascript',
        theme: 'vs-dark',
        automaticLayout: true,
        minimap: { enabled: false }
    });

    // Lancer code avec Ctrl + Entrée
    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, runCode);
});

const consoleDiv = document.getElementById("console");

function runCode() {
    consoleDiv.innerHTML = "";

    // Redirige console.log
    function aff(...args) {
        const line = args.map(arg => {
            if (typeof arg === "object") return JSON.stringify(arg, null, 2);
            return String(arg);
        }).join(" ");
        const div = document.createElement("div");
        div.textContent = line;
        consoleDiv.appendChild(div);
    }

    try {
        const userFunction = new Function("console", window.editor.getValue());
        userFunction({ log: aff });

        if (consoleDiv.innerHTML === "") {
            consoleDiv.innerHTML = '<div class="empty">Aucune sortie</div>';
        }
    } catch (err) {
        const errorDiv = document.createElement("div");
        errorDiv.textContent = "Erreur : " + err.message;
        errorDiv.style.color = "red";
        consoleDiv.appendChild(errorDiv);
    }
}
</script>

</body>
</html>
