<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Éditeur JS avec Monaco et console interactive</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.41.0/min/vs/loader.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

h1 {
    text-align: center;
    padding: 15px;
    margin: 0;
    background-color: #2563eb;
    color: white;
}

.container {
    flex: 1;
    display: flex;
    gap: 10px;
}

#console {
    width: 40%;
    background-color: black;
    color: #00ff00;
    font-family: monospace;
    padding: 10px;
    overflow-y: auto;
    white-space: pre-wrap;
    text-shadow: 0 0 5px #00ff00;
    border-radius: 10px;
}

#console input {
    background: black;
    color: #00ff00;
    border: none;
    outline: none;
    font-family: monospace;
    font-size: 14px;
    width: 95%;
}

#editorContainer {
    width: 60%;
    border-radius: 10px;
}

button {
    padding: 10px 20px;
    margin: 10px 20px;
    border: none;
    border-radius: 8px;
    background-color: #2563eb;
    color: white;
    cursor: pointer;
}

button:hover {
    background-color: #1e40af;
}

.empty {
    opacity: 0.5;
}
</style>
</head>
<body>

<h1>Éditeur JavaScript Pro</h1>

<div class="container">
    <div id="console"><div class="empty">Console vide...</div></div>
    <div id="editorContainer"></div>
</div>

<button onclick="runCode()">Lancer le code (Ctrl+Entrée)</button>

<script>
require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.41.0/min/vs' }});
require(['vs/editor/editor.main'], function () {
    window.editor = monaco.editor.create(document.getElementById('editorContainer'), {
        value: `// Exemple avec input
let name = input("Quel est ton prénom ?");
console.log("Bonjour " + name);`,
        language: 'javascript',
        theme: 'vs-dark',
        automaticLayout: true,
        minimap: { enabled: false }
    });

    // Ctrl+Entrée pour exécuter
    editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, runCode);
});

const consoleDiv = document.getElementById("console");

function runCode() {
    consoleDiv.innerHTML = "";

    // Redirige console.log
    function aff(...args) {
        const line = args.map(arg => typeof arg === "object" ? JSON.stringify(arg, null, 2) : String(arg)).join(" ");
        const div = document.createElement("div");
        div.textContent = line;
        consoleDiv.appendChild(div);
        consoleDiv.scrollTop = consoleDiv.scrollHeight;
    }

    // Fonction input interactive dans la console
    function input(message) {
        return new Promise(resolve => {
            const promptDiv = document.createElement("div");
            promptDiv.textContent = message || "";
            consoleDiv.appendChild(promptDiv);

            const inputField = document.createElement("input");
            consoleDiv.appendChild(inputField);
            inputField.focus();

            inputField.addEventListener("keydown", function(e) {
                if (e.key === "Enter") {
                    const value = inputField.value;
                    consoleDiv.removeChild(inputField);
                    const echo = document.createElement("div");
                    echo.textContent = value;
                    consoleDiv.appendChild(echo);
                    consoleDiv.scrollTop = consoleDiv.scrollHeight;
                    resolve(value);
                }
            });
        });
    }

    try {
        const userFunction = new Function("console", "input", editor.getValue());
        // Exécute la fonction async pour gérer les inputs
        (async () => { await userFunction({ log: aff }, input); })();

    } catch (err) {
        const errorDiv = document.createElement("div");
        errorDiv.textContent = "Erreur : " + err.message;
        errorDiv.style.color = "red";
        consoleDiv.appendChild(errorDiv);
    }
}
</script>

</body>
</html>
